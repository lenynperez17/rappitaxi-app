name: rappi_team
description: Rappi Team - Aplicación de transporte
version: 1.3.30+92

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State Management
  provider: ^6.1.5+1

  # Maps & Location
  google_maps_flutter: ^2.14.0
  google_maps_flutter_web: ^0.5.14+3
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  flutter_typeahead: ^5.2.0
  flutter_polyline_points: ^3.1.0
  flutter_animarker: ^3.2.0
  widget_to_marker: ^1.0.6

  # UI & Design
  google_fonts: ^6.2.1
  fl_chart: ^1.1.0
  flutter_rating_bar: ^4.0.1
  percent_indicator: ^4.2.3
  confetti: ^0.8.0

  # Storage
  shared_preferences: ^2.3.4

  # Firebase
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  firebase_storage: ^13.0.5
  firebase_messaging: ^16.1.0
  firebase_analytics: ^12.1.0
  firebase_app_check: ^0.4.1+3
  firebase_crashlytics: ^5.0.6
  firebase_database: ^12.1.1
  cloud_functions: ^6.0.5

  # OAuth y Autenticación Social
  google_sign_in: ^7.2.0
  flutter_facebook_auth: ^7.1.1
  sign_in_with_apple: ^7.0.1
  crypto: ^3.0.6

  # Notifications
  flutter_local_notifications: ^19.5.0
  timezone: ^0.10.1

  # QR Code
  qr_flutter: ^4.1.0

  # Emergency System
  flutter_phone_direct_caller: ^2.1.1
  audioplayers: ^6.1.0

  # Utilities
  intl: ^0.20.1
  url_launcher: ^6.3.1
  uuid: ^4.5.2
  logger: ^2.5.0
  http: ^1.6.0
  webview_flutter: ^4.10.0
  flutter_dotenv: ^5.2.1
  dio: ^5.6.0

  # OTP y Verificación
  pin_code_fields: ^8.0.1
  flutter_otp_text_field: ^1.2.0
  email_validator: ^3.0.0

  # Permissions
  permission_handler: ^12.0.1

  # Image
  image_picker: ^1.2.1

  # File Handling
  file_picker: ^10.3.3
  device_info_plus: ^12.1.0
  cached_network_image: ^3.4.1
  path_provider: ^2.1.5

  # Export & Document Generation
  share_plus: ^10.1.4
  pdf: ^3.11.3
  printing: ^5.13.4
  csv: ^6.0.0

  # Socket.IO para tracking en tiempo real
  socket_io_client: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/images/markers/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
    - assets/mercadopago_checkout.html
    - .env

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_rappi_taxi.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#E31E24"
  adaptive_icon_foreground: "assets/images/logo_rappi_taxi.png"

flutter_native_splash:
  color: "#E31E24"
  image: assets/images/logo_rappi_taxi.png
  android: true
  ios: true
  fullscreen: true
  android_12:
    color: "#E31E24"
    image: assets/images/logo_rappi_taxi.png
    icon_background_color: "#E31E24"
