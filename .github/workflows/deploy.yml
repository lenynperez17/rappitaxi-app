name: Deploy to Production

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  FLUTTER_VERSION: '3.16.0'
  NODE_VERSION: '20.x'

jobs:
  # Validación pre-despliegue
  pre-deploy:
    name: Pre-deployment Checks
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      
    steps:
    - uses: actions/checkout@v4
    
    - name: Extract version
      id: version
      run: |
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
        else
          VERSION=$(grep "version:" app/pubspec.yaml | sed 's/version: //')
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Deploying version: $VERSION"
        
    - name: Validate environment
      run: |
        if [[ "${{ github.event.inputs.environment }}" == "production" ]] || [[ $GITHUB_REF == refs/tags/* ]]; then
          echo "Deploying to PRODUCTION"
        else
          echo "Deploying to STAGING"
        fi

  # Deploy Backend to Firebase Functions
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: pre-deploy
    environment: ${{ github.event.inputs.environment || 'production' }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Cache Node modules
      uses: actions/cache@v3
      with:
        path: backend/node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('backend/package-lock.json') }}
        
    - name: Create environment file
      working-directory: backend
      run: |
        cat > .env << EOF
        NODE_ENV=production
        FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
        FIREBASE_PRIVATE_KEY="${{ secrets.FIREBASE_PRIVATE_KEY }}"
        FIREBASE_CLIENT_EMAIL=${{ secrets.FIREBASE_CLIENT_EMAIL }}
        MERCADOPAGO_ACCESS_TOKEN=${{ secrets.MERCADOPAGO_ACCESS_TOKEN }}
        MERCADOPAGO_PUBLIC_KEY=${{ secrets.MERCADOPAGO_PUBLIC_KEY }}
        GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}
        JWT_SECRET=${{ secrets.JWT_SECRET }}
        EOF
        
    - name: Install dependencies
      working-directory: backend
      run: npm ci
      
    - name: Build backend
      working-directory: backend
      run: npm run build
      
    - name: Deploy to Firebase Functions
      working-directory: backend
      run: |
        npm install -g firebase-tools
        firebase deploy --only functions --project ${{ secrets.FIREBASE_PROJECT_ID }} --token ${{ secrets.FIREBASE_TOKEN }}

  # Deploy Web to Firebase Hosting
  deploy-web:
    name: Deploy Web App
    runs-on: ubuntu-latest
    needs: pre-deploy
    environment: ${{ github.event.inputs.environment || 'production' }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        
    - name: Cache Flutter dependencies
      uses: actions/cache@v3
      with:
        path: |
          app/.dart_tool
          app/.pub-cache
        key: ${{ runner.os }}-flutter-${{ hashFiles('app/pubspec.lock') }}
        
    - name: Create environment file
      working-directory: app
      run: |
        cat > .env << EOF
        NODE_ENV=production
        API_BASE_URL=https://us-central1-${{ secrets.FIREBASE_PROJECT_ID }}.cloudfunctions.net/api/v1
        MERCADOPAGO_PUBLIC_KEY=${{ secrets.MERCADOPAGO_PUBLIC_KEY }}
        GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}
        ONESIGNAL_APP_ID=${{ secrets.ONESIGNAL_APP_ID }}
        EOF
        
    - name: Build web app
      working-directory: app
      run: |
        flutter pub get
        flutter build web --release --web-renderer canvaskit
        
    - name: Deploy to Firebase Hosting
      working-directory: app
      run: |
        npm install -g firebase-tools
        firebase deploy --only hosting --project ${{ secrets.FIREBASE_PROJECT_ID }} --token ${{ secrets.FIREBASE_TOKEN }}
        
    - name: Output deployment URL
      run: |
        echo "🌐 Web app deployed to: https://${{ secrets.FIREBASE_PROJECT_ID }}.web.app"

  # Build and Deploy Android to Play Store
  deploy-android:
    name: Deploy Android to Play Store
    runs-on: ubuntu-latest
    needs: [pre-deploy, deploy-backend]
    environment: ${{ github.event.inputs.environment || 'production' }}
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        
    - name: Decode Keystore
      run: |
        echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > app/android/app/keystore.jks
        
    - name: Create key.properties
      working-directory: app/android
      run: |
        cat > key.properties << EOF
        storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
        keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
        keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
        storeFile=keystore.jks
        EOF
        
    - name: Create environment file
      working-directory: app
      run: |
        cat > .env << EOF
        NODE_ENV=production
        API_BASE_URL=https://us-central1-${{ secrets.FIREBASE_PROJECT_ID }}.cloudfunctions.net/api/v1
        MERCADOPAGO_PUBLIC_KEY=${{ secrets.MERCADOPAGO_PUBLIC_KEY }}
        GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}
        EOF
        
    - name: Build App Bundle
      working-directory: app
      run: |
        flutter pub get
        flutter build appbundle --release --obfuscate --split-debug-info=build/debug
        
    - name: Upload to Play Store
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
        packageName: com.rappitaxi.app
        releaseFiles: app/build/app/outputs/bundle/release/app-release.aab
        track: production
        whatsNewDirectory: app/whatsnew

  # Deploy iOS to App Store
  deploy-ios:
    name: Deploy iOS to App Store
    runs-on: macos-latest
    needs: [pre-deploy, deploy-backend]
    environment: ${{ github.event.inputs.environment || 'production' }}
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        
    - name: Install Apple Certificate
      uses: apple-actions/import-codesign-certs@v2
      with:
        p12-file-base64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
        p12-password: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        
    - name: Install Provisioning Profile
      run: |
        PP_PATH=$HOME/Library/MobileDevice/Provisioning\ Profiles
        mkdir -p "$PP_PATH"
        echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > "$PP_PATH/profile.mobileprovision"
        
    - name: Create environment file
      working-directory: app
      run: |
        cat > .env << EOF
        NODE_ENV=production
        API_BASE_URL=https://us-central1-${{ secrets.FIREBASE_PROJECT_ID }}.cloudfunctions.net/api/v1
        MERCADOPAGO_PUBLIC_KEY=${{ secrets.MERCADOPAGO_PUBLIC_KEY }}
        GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}
        EOF
        
    - name: Build iOS App
      working-directory: app
      run: |
        flutter pub get
        flutter build ipa --release --obfuscate --split-debug-info=build/debug
        
    - name: Upload to App Store
      run: |
        xcrun altool --upload-app \
          --type ios \
          --file app/build/ios/ipa/*.ipa \
          --username "${{ secrets.APPLE_ID }}" \
          --password "${{ secrets.APPLE_APP_PASSWORD }}"

  # Post-deployment tasks
  post-deploy:
    name: Post Deployment Tasks
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-web]
    if: always()
    
    steps:
    - name: Smoke Tests
      run: |
        # Test backend health
        curl -f https://us-central1-${{ secrets.FIREBASE_PROJECT_ID }}.cloudfunctions.net/api/v1/health || exit 1
        
        # Test web app
        curl -f https://${{ secrets.FIREBASE_PROJECT_ID }}.web.app || exit 1
        
    - name: Notify Slack
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: |
          🚀 Deployment Status: ${{ job.status }}
          📦 Version: ${{ needs.pre-deploy.outputs.version }}
          🌍 Environment: ${{ github.event.inputs.environment || 'production' }}
          👤 Deployed by: ${{ github.actor }}
          
          Backend: https://us-central1-${{ secrets.FIREBASE_PROJECT_ID }}.cloudfunctions.net/api
          Web: https://${{ secrets.FIREBASE_PROJECT_ID }}.web.app
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        
    - name: Create GitHub Release
      if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          app/build/app/outputs/bundle/release/app-release.aab
          app/build/app/outputs/flutter-apk/app-release.apk
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Invalidate CDN Cache
      run: |
        # Invalidate Firebase Hosting cache
        echo "Cache invalidation triggered"
        
    - name: Update Status Page
      run: |
        # Update external status page
        echo "Status page updated with new deployment"